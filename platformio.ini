; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = release-mic-in

[env]
platform = teensy
board = teensy40
framework = arduino
lib_deps =
	Audio @ ^1.3
	kosme/arduinoFFT@^2.0.4
	adafruit/Adafruit ILI9341@^1.6.3
upload_protocol = teensy-cli

[env:release-mic-in]
build_flags =
    -D MIC_IN=1
    -D HSYNC_FREQUENCY_TOLERANCE=150
    -D HSYNC_TIMING_TOLERANCE_MS=2.0

[env:release-usb-in]
build_flags =
    -D USB_IN=1
    -D USB_MIDI_AUDIO_SERIAL


[env:debug_frequency]
build_flags = -D DEBUG_FREQUENCY=1

[env:debug_waveform]
build_flags = -D DEBUG_WAVEFORM=1

[env:debug_decoder_output]
build_flags = -D DEBUG_DECODER_OUTPUT=1

[env:debug_decoder_state]
build_flags = -D DEBUG_DECODER_STATE=1

